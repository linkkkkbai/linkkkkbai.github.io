<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Map</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 24px 32px 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  header h1 {
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  header .count {
    font-size: 14px;
    color: #666;
  }
  header .count span {
    color: #fff;
  }
  #map {
    flex: 1;
    cursor: grab;
  }
  #map:active { cursor: grabbing; }
  .country {
    fill: #1a1a1a;
    stroke: #333;
    stroke-width: 0.5px;
    transition: fill 0.2s;
  }
  .country:hover {
    fill: #333;
  }
  .country.visited {
    fill: #fff;
  }
  .country.visited:hover {
    fill: #ccc;
  }
  .marker {
    fill: #fff;
    stroke: #0a0a0a;
    stroke-width: 1px;
  }
  .marker-label {
    fill: #999;
    font-size: 10px;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
  }
  #tooltip {
    position: fixed;
    background: #fff;
    color: #0a0a0a;
    padding: 4px 10px;
    font-size: 12px;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }
</style>
</head>
<body>

<header>
  <h1>Places I've Been</h1>
  <div class="count"><span id="num">0</span> countries & regions</div>
</header>

<div id="map"></div>
<div id="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/topojson.v3.min.js"></script>
<script>

const visited = [
  "China", "Taiwan", "Malaysia",
  "United States of America", "Japan"
];

const markers = [
  { name: "Hong Kong", coords: [114.17, 22.32] }
];

const totalCount = visited.length + markers.length;
document.getElementById("num").textContent = totalCount;

const width = window.innerWidth;
const height = window.innerHeight - 60;

const projection = d3.geoNaturalEarth1()
  .scale(width / 5.5)
  .translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

const svg = d3.select("#map")
  .append("svg")
  .attr("width", width)
  .attr("height", height);

const g = svg.append("g");

const tooltip = d3.select("#tooltip");

const zoom = d3.zoom()
  .scaleExtent([1, 8])
  .on("zoom", (e) => g.attr("transform", e.transform));

svg.call(zoom);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world => {
  const countries = topojson.feature(world, world.objects.countries);

  g.selectAll(".country")
    .data(countries.features)
    .join("path")
    .attr("class", d => {
      const name = d.properties.name;
      return visited.includes(name) ? "country visited" : "country";
    })
    .attr("d", path)
    .on("mouseover", (e, d) => {
      const label = visited.includes(d.properties.name)
        ? d.properties.name + " ✓"
        : d.properties.name;
      tooltip.style("opacity", 1).text(label);
    })
    .on("mousemove", (e) => {
      tooltip
        .style("left", (e.clientX + 12) + "px")
        .style("top", (e.clientY - 28) + "px");
    })
    .on("mouseout", () => tooltip.style("opacity", 0));

  markers.forEach(m => {
    const [x, y] = projection(m.coords);
    g.append("circle")
      .attr("class", "marker")
      .attr("cx", x).attr("cy", y).attr("r", 3)
      .on("mouseover", (e) => {
        tooltip.style("opacity", 1).text(m.name + " ✓");
      })
      .on("mousemove", (e) => {
        tooltip
          .style("left", (e.clientX + 12) + "px")
          .style("top", (e.clientY - 28) + "px");
      })
      .on("mouseout", () => tooltip.style("opacity", 0));
  });
});

window.addEventListener("resize", () => {
  const w = window.innerWidth;
  const h = window.innerHeight - 60;
  svg.attr("width", w).attr("height", h);
  projection.scale(w / 5.5).translate([w / 2, h / 2]);
  g.selectAll(".country").attr("d", path);
  markers.forEach(m => {
    const [x, y] = projection(m.coords);
    g.selectAll(".marker").attr("cx", x).attr("cy", y);
  });
});

</script>
</body>
</html>
