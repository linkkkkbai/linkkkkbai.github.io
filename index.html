<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>linkkkkbai</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    color: #1a1a1a;
    font-family: -apple-system, "Helvetica Neue", "Segoe UI", sans-serif;
    line-height: 1.6;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .hero {
    padding: 80px 0 40px;
    text-align: center;
  }
  .hero h1 { font-size: 32px; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; }
  .hero p { color: #888; font-size: 16px; }

  .section {
    padding: 48px 0;
    border-top: 1px solid #eee;
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #999;
    margin-bottom: 32px;
  }

  .map-box {
    width: 100%;
    background: #fafafa;
    border-radius: 8px;
    overflow: hidden;
    cursor: grab;
  }
  .map-box:active { cursor: grabbing; }
  .map-box svg { display: block; }

  .map-stats {
    margin-top: 12px;
    font-size: 13px;
    color: #999;
  }
  .map-stats span { color: #1a1a1a; font-weight: 600; }

  #china-map {
    width: 100%;
    height: 600px;
    background: #fafafa;
    border-radius: 8px;
  }

  #tooltip {
    position: fixed;
    background: #1a1a1a;
    color: #fff;
    padding: 4px 12px;
    font-size: 12px;
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    white-space: nowrap;
  }

  .bucket-list {
    display: flex;
    flex-direction: column;
  }
  .bucket-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 15px;
  }
  .bucket-item:last-child { border-bottom: none; }
  .bucket-item .check {
    width: 18px; height: 18px;
    border: 2px solid #ccc;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .bucket-item.done .check {
    background: #1a1a1a;
    border-color: #1a1a1a;
    position: relative;
  }
  .bucket-item.done .check::after {
    content: "✓"; color: #fff; font-size: 12px;
    position: absolute; top: -1px; left: 2px;
  }
  .bucket-item.done .label { text-decoration: line-through; color: #999; }

  footer {
    padding: 48px 0;
    border-top: 1px solid #eee;
    text-align: center;
    color: #ccc;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <h1>linkkkkbai</h1>
    <p>exploring the world, one place at a time</p>
  </div>

  <!-- World Map (D3) -->
  <div class="section">
    <div class="section-title">World</div>
    <div class="map-box" id="world-map"></div>
    <div class="map-stats"><span>5</span> countries & regions</div>
  </div>

  <!-- China Map (ECharts) -->
  <div class="section">
    <div class="section-title">China</div>
    <div id="china-map"></div>
    <div class="map-stats"><span>28</span> / 34 provinces & regions</div>
  </div>

  <!-- Bucket List -->
  <div class="section">
    <div class="section-title">Bucket List</div>
    <div class="bucket-list" id="bucket-list"></div>
  </div>

  <footer>© 2024 linkkkkbai</footer>
</div>

<div id="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/topojson.v3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>

/* --- Tooltip (for world map) --- */
var tooltip = d3.select("#tooltip");
function showTip(e, text) {
  tooltip.style("opacity", 1).text(text)
    .style("left", (e.clientX + 12) + "px")
    .style("top", (e.clientY - 32) + "px");
}
function moveTip(e) {
  tooltip.style("left", (e.clientX + 12) + "px").style("top", (e.clientY - 32) + "px");
}
function hideTip() { tooltip.style("opacity", 0); }

/* ========== World Map (D3) ========== */
var visitedCountries = ["China", "Taiwan", "Malaysia", "United States of America", "Japan"];

var ww = 900, wh = 480;
var wProj = d3.geoNaturalEarth1().scale(ww / 5.2).translate([ww / 2, wh / 2]);
var wPath = d3.geoPath().projection(wProj);
var wSvg = d3.select("#world-map").append("svg").attr("width", ww).attr("height", wh);
var wG = wSvg.append("g");
wSvg.call(d3.zoom().scaleExtent([1, 6]).on("zoom", function(e) { wG.attr("transform", e.transform); }));

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(function(world) {
  wG.selectAll("path")
    .data(topojson.feature(world, world.objects.countries).features)
    .join("path")
    .attr("d", wPath)
    .attr("fill", function(d) { return visitedCountries.includes(d.properties.name) ? "#1a1a1a" : "#e8e8e8"; })
    .attr("stroke", "#fff")
    .attr("stroke-width", 0.5)
    .on("mouseover", function(e, d) { showTip(e, d.properties.name + (visitedCountries.includes(d.properties.name) ? " ✓" : "")); })
    .on("mousemove", moveTip)
    .on("mouseout", hideTip);
});

/* ========== China Map (ECharts) ========== */
var visitedProvinces = [
  "山西","内蒙古","辽宁","黑龙江","上海","重庆","四川","云南",
  "广东","湖北","安徽","江苏","浙江","江西","北京","天津",
  "河南","河北","甘肃","青海","宁夏","陕西","海南","香港",
  "澳门","山东","福建","台湾"
];

function isProvinceVisited(name) {
  return visitedProvinces.some(function(s) { return name.startsWith(s); });
}

fetch("china.json").then(function(r) { return r.json(); }).then(function(china) {
  echarts.registerMap("china", china);
  var chart = echarts.init(document.getElementById("china-map"));

  var data = [];
  china.features.forEach(function(f) {
    var name = f.properties.name;
    if (!name) return;
    data.push({ name: name, value: isProvinceVisited(name) ? 1 : 0 });
  });

  chart.setOption({
    tooltip: {
      trigger: "item",
      formatter: function(p) { return p.name + (p.value ? " ✓" : ""); },
      backgroundColor: "#1a1a1a",
      borderColor: "#1a1a1a",
      textStyle: { color: "#fff", fontSize: 12 }
    },
    series: [{
      type: "map",
      map: "china",
      roam: true,
      data: data,
      itemStyle: { areaColor: "#e8e8e8", borderColor: "#fff", borderWidth: 1 },
      emphasis: { itemStyle: { areaColor: "#ccc" }, label: { show: true, color: "#1a1a1a" } },
      select: { disabled: true }
    }],
    visualMap: {
      show: false,
      min: 0, max: 1,
      inRange: { color: ["#e8e8e8", "#1a1a1a"] }
    }
  });

  window.addEventListener("resize", function() { chart.resize(); });
});

/* ========== Bucket List ========== */
var items = [
  { text: "Bungee jumping ...", done: false },
  { text: "Skydiving ...", done: false },
  { text: "Get a scuba diving license ...", done: false },
  { text: "Buy a motorcycle ...", done: false },
  { text: "Taste 1982 Lafite ...", done: false },
  { text: "Learn to drift ...", done: false },
  { text: "Fly a plane ...", done: false }
];

var listEl = document.getElementById("bucket-list");
items.forEach(function(item) {
  var div = document.createElement("div");
  div.className = "bucket-item" + (item.done ? " done" : "");
  div.innerHTML = '<div class="check"></div><span class="label">' + item.text + '</span>';
  listEl.appendChild(div);
});

</script>
</body>
</html>
