<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>linkkkkbai</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    color: #1a1a1a;
    font-family: -apple-system, "Helvetica Neue", "Segoe UI", sans-serif;
    line-height: 1.6;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px;
  }

  .hero {
    padding: 80px 0 40px;
    text-align: center;
  }
  .hero h1 { font-size: 32px; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; }
  .hero p { color: #888; font-size: 16px; }

  .section {
    padding: 48px 0;
    border-top: 1px solid #eee;
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: #999;
    margin-bottom: 32px;
  }

  .map-box {
    width: 100%;
    background: #fafafa;
    border-radius: 8px;
    overflow: hidden;
    cursor: grab;
  }
  .map-box:active { cursor: grabbing; }
  .map-box svg { display: block; }

  .map-stats {
    margin-top: 12px;
    font-size: 13px;
    color: #999;
  }
  .map-stats span { color: #1a1a1a; font-weight: 600; }

  #china-map {
    width: 100%;
    height: 600px;
    background: #fafafa;
    border-radius: 8px;
  }

  #tooltip {
    position: fixed;
    background: #1a1a1a;
    color: #fff;
    padding: 4px 12px;
    font-size: 12px;
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    white-space: nowrap;
  }

  .bucket-list {
    display: flex;
    flex-direction: column;
  }
  .bucket-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 15px;
  }
  .bucket-item:last-child { border-bottom: none; }
  .bucket-item .check {
    width: 18px; height: 18px;
    border: 2px solid #ccc;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .bucket-item.done .check {
    background: #1a1a1a;
    border-color: #1a1a1a;
    position: relative;
  }
  .bucket-item.done .check::after {
    content: "\2713"; color: #fff; font-size: 12px;
    position: absolute; top: -1px; left: 2px;
  }
  .bucket-item.done .label { text-decoration: line-through; color: #999; }

  footer {
    padding: 48px 0;
    border-top: 1px solid #eee;
    text-align: center;
    color: #ccc;
    font-size: 13px;
  }

  /* ===== Slot Machine Cabinet ===== */
  .slot-cabinet {
    max-width: 540px;
    margin: 0 auto;
    background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
    border-radius: 24px;
    padding: 24px;
    box-shadow:
      0 12px 40px rgba(0,0,0,0.5),
      inset 0 2px 0 rgba(255,255,255,0.05),
      inset 0 -2px 0 rgba(0,0,0,0.3);
    border: 3px solid #444;
    position: relative;
  }

  /* Top marquee with title */
  .slot-marquee {
    text-align: center;
    padding: 8px 0 16px;
    position: relative;
  }
  .slot-marquee h2 {
    font-size: 24px;
    font-weight: 900;
    color: #ffd700;
    text-shadow:
      0 0 10px rgba(255,215,0,0.6),
      0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 8px;
    text-transform: uppercase;
    font-family: monospace;
    margin: 0;
  }

  /* Decorative lights on top */
  .slot-lights {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .slot-light {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    box-shadow: 0 0 6px currentColor, 0 0 12px currentColor;
  }
  .slot-light.red { color: #ff4444; background: #ff4444; }
  .slot-light.yellow { color: #ffcc00; background: #ffcc00; }
  .slot-light.green { color: #44ff44; background: #44ff44; }

  /* The game canvas area */
  .slot-reel-window {
    background: #111;
    border-radius: 8px;
    padding: 12px;
    border: 2px solid #333;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
  }
  #slot-game {
    display: flex;
    justify-content: center;
  }
  #slot-game canvas {
    border-radius: 4px;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* Bottom panel with controls */
  .slot-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    padding: 8px 0;
  }
  .slot-credit {
    font-family: monospace;
    font-size: 12px;
    color: #888;
    letter-spacing: 2px;
  }
  .slot-credit span {
    color: #ffd700;
    font-weight: bold;
  }

  /* Side decorations (rivets/screws) */
  .slot-cabinet::before,
  .slot-cabinet::after {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #666, #333);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
  }
  .slot-cabinet::before { top: 12px; left: 12px; }
  .slot-cabinet::after { top: 12px; right: 12px; }

  .slot-bottom-rivets {
    position: absolute;
    bottom: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
  }
  .slot-bottom-rivets::before,
  .slot-bottom-rivets::after {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #666, #333);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
  }

  /* ===== Pixel Music Player (floating) ===== */
  .pixel-player {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
    width: 240px;
    background: #2a2a2a;
    border: 3px solid #555;
    border-radius: 8px;
    padding: 10px;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
    font-family: monospace;
    image-rendering: pixelated;
    cursor: move;
  }

  /* Top label */
  .pixel-player-label {
    text-align: center;
    font-size: 8px;
    color: #888;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* Cassette window */
  .pixel-player-cassette {
    background: #1a1a1a;
    border: 2px solid #444;
    border-radius: 4px;
    padding: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  /* Spinning reels */
  .pixel-reel {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #333;
    border: 2px solid #555;
    position: relative;
    flex-shrink: 0;
  }
  .pixel-reel::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #222;
    border: 1px solid #444;
  }
  .pixel-reel::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 10px;
    background: #555;
  }
  .pixel-reel.spinning {
    animation: spin-reel 1s linear infinite;
  }
  @keyframes spin-reel {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Tape window (the clear part showing tape) */
  .pixel-tape-window {
    flex: 1;
    height: 20px;
    background: #111;
    border: 1px solid #444;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pixel-tape-line {
    width: 80%;
    height: 2px;
    background: #444;
    position: relative;
  }
  .pixel-tape-line::before,
  .pixel-tape-line::after {
    content: '';
    position: absolute;
    top: -4px;
    width: 4px;
    height: 10px;
    background: #555;
  }
  .pixel-tape-line::before { left: 0; }
  .pixel-tape-line::after { right: 0; }

  /* LCD display */
  .pixel-player-display {
    background: #0a2a0a;
    border: 2px solid #444;
    border-radius: 2px;
    padding: 4px 6px;
    margin-bottom: 8px;
  }
  .pixel-player-title {
    font-size: 10px;
    color: #44ff44;
    text-shadow: 0 0 4px rgba(68,255,68,0.5);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .pixel-player-time {
    font-size: 9px;
    color: #33cc33;
    text-align: right;
  }

  /* Progress bar */
  .pixel-player-progress {
    width: 100%;
    height: 4px;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 2px;
    margin-bottom: 8px;
    cursor: pointer;
    position: relative;
  }
  .pixel-player-progress-fill {
    height: 100%;
    background: #44ff44;
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* Controls */
  .pixel-player-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
  }
  .pixel-btn {
    width: 28px;
    height: 22px;
    background: #444;
    border: 2px solid #666;
    border-bottom-color: #222;
    border-right-color: #222;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #ccc;
    font-size: 10px;
    user-select: none;
  }
  .pixel-btn:active {
    border: 2px solid #222;
    border-bottom-color: #666;
    border-right-color: #666;
    background: #333;
  }
  .pixel-btn-play {
    width: 36px;
    height: 26px;
    background: #cc2222;
    border-color: #ff4444 #881111 #881111 #ff4444;
  }
  .pixel-btn-play:active {
    background: #aa1111;
    border-color: #881111 #ff4444 #ff4444 #881111;
  }

  /* Volume */
  .pixel-player-volume {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
  }
  .pixel-volume-icon {
    font-size: 10px;
    color: #888;
    width: 14px;
    text-align: center;
  }
  .pixel-volume-slider {
    flex: 1;
    height: 4px;
    background: #1a1a1a;
    border: 1px solid #444;
    border-radius: 2px;
    cursor: pointer;
    position: relative;
  }
  .pixel-volume-fill {
    height: 100%;
    background: #888;
    border-radius: 2px;
    width: 70%;
  }
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <h1>linkkkkbai</h1>
    <p>exploring the world, one place at a time</p>
  </div>

  <!-- Slot Machine -->
  <div class="section">
    <div class="section-title">Lucky Slot</div>
    <div class="slot-cabinet">
      <div class="slot-lights">
        <div class="slot-light red"></div>
        <div class="slot-light yellow"></div>
        <div class="slot-light green"></div>
        <div class="slot-light yellow"></div>
        <div class="slot-light red"></div>
      </div>
      <div class="slot-marquee">
        <h2>Lucky Slot</h2>
      </div>
      <div class="slot-reel-window">
        <div id="slot-game"></div>
      </div>
      <div class="slot-controls">
        <div class="slot-credit">CREDITS: <span id="credit-display">100</span></div>
        <div class="slot-credit">WIN: <span id="win-display">0</span></div>
      </div>
      <div class="slot-bottom-rivets"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
  <script>
  /* ==========================================================
  *  Lucky Slot - Phaser 3 + Pixel Art Assets (CC-BY 4.0)
  *  - Correct symbol crop coordinates from sprite sheet
  *  - Transparent background, CSS cabinet frame
  *  - Sound effects via Web Audio API
  *  - Fullscreen coin explosion on win
  * ========================================================== */
  class SlotScene extends Phaser.Scene {
    constructor() { super({ key: 'SlotScene' }); }

    // ===== Load assets =====
    preload() {
      this.load.image('fruits', 'asset/pixel_art_slot_machine_-_fruits.png');
    }

    create() {
      // ===== Extract symbol textures with CORRECT coordinates =====
      // Based on detailed analysis of the sprite sheet (181x157):
      // Large symbols (51x33): Col 0 at x=5, Col 1 at x=61
      // Rows at y=5, 43, 81, 119

      var symbols = [
        { name: 'orange',     x: 5,   y: 5,   w: 51, h: 33 },  // Col 0, Row 0
        { name: 'watermelon', x: 5,   y: 43,  w: 51, h: 33 },  // Col 0, Row 1
        { name: 'bell',       x: 5,   y: 119, w: 51, h: 33 },  // Col 0, Row 3
        { name: 'bar',        x: 61,  y: 43,  w: 51, h: 33 },  // Col 1, Row 1
        { name: 'seven',      x: 61,  y: 81,  w: 51, h: 33 },  // Col 1, Row 2
      ];

      var fruitsTex = this.textures.get('fruits');
      var sourceImg = fruitsTex.getSourceImage();

      symbols.forEach(function(sym) {
        var tex = this.textures.createCanvas(sym.name, sym.w, sym.h);
        var ctx = tex.getContext();
        ctx.drawImage(sourceImg, sym.x, sym.y, sym.w, sym.h, 0, 0, sym.w, sym.h);
        tex.refresh();
      }.bind(this));

      this.symbolNames = symbols.map(function(s) { return s.name; });

      // ===== Layout =====
      this.SYMBOL_SIZE = 56;
      this.PADDING     = 10;
      this.REEL_COUNT  = 3;
      this.ROW_COUNT   = 3;

      this.centerX = this.scale.width / 2;
      this.centerY = this.scale.height / 2;

      var gridW = this.REEL_COUNT * this.SYMBOL_SIZE + (this.REEL_COUNT - 1) * this.PADDING;
      var gridH = this.ROW_COUNT * this.SYMBOL_SIZE + (this.ROW_COUNT - 1) * this.PADDING;

      this.startX = this.centerX - gridW / 2 + this.SYMBOL_SIZE / 2;
      this.startY = this.centerY - gridH / 2 + this.SYMBOL_SIZE / 2 - 24;

      // ===== Cell backgrounds =====
      for (var c = 0; c < this.REEL_COUNT; c++) {
        for (var r = 0; r < this.ROW_COUNT; r++) {
          var x = this.startX + c * (this.SYMBOL_SIZE + this.PADDING);
          var y = this.startY + r * (this.SYMBOL_SIZE + this.PADDING);
          var bg = this.add.graphics();
          bg.fillStyle(0x111111);
          bg.fillRoundedRect(
            x - this.SYMBOL_SIZE / 2, y - this.SYMBOL_SIZE / 2,
            this.SYMBOL_SIZE, this.SYMBOL_SIZE, 4
          );
          // Add subtle border
          bg.lineStyle(1, 0x333333);
          bg.strokeRoundedRect(
            x - this.SYMBOL_SIZE / 2, y - this.SYMBOL_SIZE / 2,
            this.SYMBOL_SIZE, this.SYMBOL_SIZE, 4
          );
        }
      }

      // ===== Place symbols =====
      this.reels = [];
      for (var c = 0; c < this.REEL_COUNT; c++) {
        this.reels[c] = [];
        for (var r = 0; r < this.ROW_COUNT; r++) {
          var idx = Phaser.Math.Between(0, this.symbolNames.length - 1);
          var x = this.startX + c * (this.SYMBOL_SIZE + this.PADDING);
          var y = this.startY + r * (this.SYMBOL_SIZE + this.PADDING);
          var img = this.add.image(x, y, this.symbolNames[idx]);
          img.setDisplaySize(this.SYMBOL_SIZE - 8, this.SYMBOL_SIZE - 8);
          img.symbolIndex = idx;
          this.reels[c][r] = img;
        }
      }

      // ===== SPIN button =====
      var btnX = this.centerX;
      var btnY = this.startY + gridH + 40;
      var btnW = 80, btnH = 32;

      this.btnBg = this.add.graphics();
      this.btnBg.fillStyle(0xcc2222);
      this.btnBg.fillRoundedRect(btnX - btnW / 2, btnY - btnH / 2, btnW, btnH, 4);
      this.btnBg.lineStyle(2, 0xff4444);
      this.btnBg.strokeRoundedRect(btnX - btnW / 2, btnY - btnH / 2, btnW, btnH, 4);

      this.add.text(btnX, btnY, 'SPIN', {
        fontSize: '16px', color: '#ffffff', fontStyle: 'bold',
        fontFamily: 'monospace'
      }).setOrigin(0.5);

      var spinBtn = this.add.zone(btnX, btnY, btnW, btnH)
                        .setInteractive({ useHandCursor: true });
      this.isSpinning = false;

      spinBtn.on('pointerover', function() { this.btnBg.setAlpha(0.7); }.bind(this));
      spinBtn.on('pointerout',  function() { this.btnBg.setAlpha(1);   }.bind(this));

      var self = this;
      spinBtn.on('pointerdown', function() {
        if (!self.isSpinning) {
          self.isSpinning = true;
          self.resultText.setText('');
          self.spinAllReels();
        }
      });

      // ===== Result text =====
      this.resultText = this.add.text(this.centerX, btnY + 28, '', {
        fontSize: '14px', color: '#ffffff', fontFamily: 'monospace'
      }).setOrigin(0.5);

      // ===== Audio =====
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      this.playTone = function(freq, dur, type) {
        var o = this.audioCtx.createOscillator();
        var g = this.audioCtx.createGain();
        o.type = type || 'sine';
        o.frequency.value = freq;
        o.connect(g);
        g.connect(this.audioCtx.destination);
        g.gain.value = 0.3;
        o.start();
        o.stop(this.audioCtx.currentTime + dur);
      };

      this.playSpinSound = function() { this.playTone(300, 0.1, 'square'); };
      this.playStopSound = function() { this.playTone(600, 0.15, 'sine'); };

      this.playWinSound = function() {
        var s = this;
        [523, 659, 784, 1047, 1319].forEach(function(f, i) {
          setTimeout(function() { s.playTone(f, 0.3, 'sine'); }, i * 150);
        });
      };

      this.playCoinSound = function() {
        this.playTone(1200 + Math.random() * 400, 0.08, 'sine');
      };
    }

    spinAllReels() {
      var WIN_CHANCE = 0.25;
      var isWin = Math.random() < WIN_CHANCE;

      if (isWin) this.winSymbolIndex = Phaser.Math.Between(0, this.symbolNames.length - 1);

      this.finalResults = [];
      for (var c = 0; c < this.REEL_COUNT; c++) {
        this.finalResults[c] = [];
        for (var r = 0; r < this.ROW_COUNT; r++) {
          this.finalResults[c][r] = (isWin && r === 1)
            ? this.winSymbolIndex
            : Phaser.Math.Between(0, this.symbolNames.length - 1);
        }
      }

      for (var c = 0; c < this.REEL_COUNT; c++) this.startReelSpin(c);

      this.spinSoundInterval = setInterval(function() {
        this.playSpinSound();
      }.bind(this), 150);

      for (var c = 0; c < this.REEL_COUNT; c++) {
        (function(self, ci) {
          self.time.delayedCall(1500 + ci * 500, function() {
            self.stopReel(ci);
          });
        })(this, c);
      }
    }

    startReelSpin(col) {
      var self = this;
      if (!this.reelTimers) this.reelTimers = [];

      this.reelTimers[col] = this.time.addEvent({
        delay: 80,
        loop: true,
        callback: function() {
          for (var r = 0; r < self.ROW_COUNT; r++) {
            var idx = Phaser.Math.Between(0, self.symbolNames.length - 1);
            self.reels[col][r].setTexture(self.symbolNames[idx]);
            self.reels[col][r].setDisplaySize(self.SYMBOL_SIZE - 8, self.SYMBOL_SIZE - 8);
            self.reels[col][r].symbolIndex = idx;
          }
        }
      });
    }

    stopReel(col) {
      if (this.reelTimers[col]) {
        this.reelTimers[col].remove();
        this.reelTimers[col] = null;
      }

      this.playStopSound();

      for (var r = 0; r < this.ROW_COUNT; r++) {
        var fi = this.finalResults[col][r];
        this.reels[col][r].setTexture(this.symbolNames[fi]);
        this.reels[col][r].setDisplaySize(this.SYMBOL_SIZE - 8, this.SYMBOL_SIZE - 8);
        this.reels[col][r].symbolIndex = fi;
      }

      for (var r = 0; r < this.ROW_COUNT; r++) {
        this.tweens.add({
          targets: this.reels[col][r],
          y: this.reels[col][r].y - 10,
          duration: 100,
          yoyo: true,
          ease: 'Bounce.easeOut'
        });
      }

      if (col === this.REEL_COUNT - 1) {
        clearInterval(this.spinSoundInterval);
        this.time.delayedCall(300, this.checkWin, [], this);
      }
    }

    explodeCoins() {
      var self = this;

      var overlay = document.createElement('div');
      overlay.id = 'coin-overlay';
      overlay.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;pointer-events:none;';
      document.body.appendChild(overlay);

      var coinGame = new Phaser.Game({
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        parent: 'coin-overlay',
        transparent: true,
        scene: {
          create: function() {
            var g = this.make.graphics({ add: false });
            g.fillStyle(0xffd700); g.fillCircle(12, 12, 12);
            g.fillStyle(0xffa500); g.fillCircle(12, 12, 8);
            g.fillStyle(0xffd700); g.fillRect(9, 6, 6, 12); g.fillRect(7, 9, 10, 3);
            g.generateTexture('bigcoin', 24, 24);
            g.destroy();

            var em = this.add.particles(0, 0, 'bigcoin', {
              x: { min: 0, max: window.innerWidth },
              y: -20,
              speedY: { min: 300, max: 800 },
              speedX: { min: -200, max: 200 },
              gravityY: 400,
              angle: { min: -20, max: 20 },
              scale: { start: 1.5, end: 0.5 },
              alpha: { start: 1, end: 0 },
              lifespan: 3000,
              rotate: { min: -360, max: 360 },
              frequency: 80,
              quantity: 6,
              emitting: true
            });

            this.time.delayedCall(3000, function() { em.stop(); });
            this.time.delayedCall(4500, function() {
              var el = document.getElementById('coin-overlay');
              if (el) el.remove();
              coinGame.destroy(true);
            });
          }
        }
      });

      var ct = setInterval(function() { self.playCoinSound(); }, 200);
      setTimeout(function() { clearInterval(ct); }, 3000);
    }

    checkWin() {
      var m0 = this.reels[0][1].symbolIndex;
      var m1 = this.reels[1][1].symbolIndex;
      var m2 = this.reels[2][1].symbolIndex;

      if (m0 === m1 && m1 === m2) {
        this.resultText.setText('JACKPOT! ' + this.symbolNames[m0].toUpperCase() + ' x3 !')
                        .setColor('#00ff00');
        this.cameras.main.shake(500, 0.02);
        this.playWinSound();
        this.explodeCoins();
      } else {
        this.resultText.setText('Try again!').setColor('#ff4444');
      }
      this.isSpinning = false;
    }
  }

  var config = {
    type: Phaser.AUTO,
    width: 460,
    height: 360,
    parent: 'slot-game',
    transparent: true,
    scene: SlotScene
  };
  new Phaser.Game(config);
  </script>

<script>

/* --- Tooltip (for world map) --- */
var tooltip = d3.select("#tooltip");
function showTip(e, text) {
  tooltip.style("opacity", 1).text(text)
    .style("left", (e.clientX + 12) + "px")
    .style("top", (e.clientY - 32) + "px");
}
function moveTip(e) {
  tooltip.style("left", (e.clientX + 12) + "px").style("top", (e.clientY - 32) + "px");
}
function hideTip() { tooltip.style("opacity", 0); }

/* ========== World Map (D3) ========== */
var visitedCountries = ["China", "Taiwan", "Malaysia", "United States of America", "Japan"];

var ww = 900, wh = 480;
var wProj = d3.geoNaturalEarth1().scale(ww / 5.2).translate([ww / 2, wh / 2]);
var wPath = d3.geoPath().projection(wProj);
var wSvg = d3.select("#world-map").append("svg").attr("width", ww).attr("height", wh);
var wG = wSvg.append("g");
wSvg.call(d3.zoom().scaleExtent([1, 6]).on("zoom", function(e) { wG.attr("transform", e.transform); }));

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(function(world) {
  wG.selectAll("path")
    .data(topojson.feature(world, world.objects.countries).features)
    .join("path")
    .attr("d", wPath)
    .attr("fill", function(d) { return visitedCountries.includes(d.properties.name) ? "#1a1a1a" : "#e8e8e8"; })
    .attr("stroke", "#fff")
    .attr("stroke-width", 0.5)
    .on("mouseover", function(e, d) { showTip(e, d.properties.name + (visitedCountries.includes(d.properties.name) ? " \u2713" : "")); })
    .on("mousemove", moveTip)
    .on("mouseout", hideTip);
});

/* ========== China Map (ECharts) ========== */
var visitedProvinces = [
  "\u5C71\u897F","\u5185\u8499\u53E4","\u8FBD\u5B81","\u9ED1\u9F99\u6C5F","\u4E0A\u6D77","\u91CD\u5E86","\u56DB\u5DDD","\u4E91\u5357",
  "\u5E7F\u4E1C","\u6E56\u5317","\u5B89\u5FBD","\u6C5F\u82CF","\u6D59\u6C5F","\u6C5F\u897F","\u5317\u4EAC","\u5929\u6D25",
  "\u6CB3\u5357","\u6CB3\u5317","\u7518\u8083","\u9752\u6D77","\u5B81\u590F","\u9655\u897F","\u6D77\u5357","\u9999\u6E2F",
  "\u6FB3\u95E8","\u5C71\u4E1C","\u798F\u5EFA","\u53F0\u6E7E"
];

function isProvinceVisited(name) {
  return visitedProvinces.some(function(s) { return name.startsWith(s); });
}

fetch("china.json").then(function(r) { return r.json(); }).then(function(china) {
  echarts.registerMap("china", china);

  var data = [];
  china.features.forEach(function(f) {
    var name = f.properties.name;

  chart.setOption({
    tooltip: {
      trigger: "item",
      formatter: function(p) { return p.name + (p.value ? " \u2713" : ""); },
      backgroundColor: "#1a1a1a",
      borderColor: "#1a1a1a",
      textStyle: { color: "#fff", fontSize: 12 }
    },
    series: [{
      type: "map",
      map: "china",
      roam: true,
      data: data,
      itemStyle: { areaColor: "#e8e8e8", borderColor: "#fff", borderWidth: 1 },
      emphasis: { itemStyle: { areaColor: "#ccc" }, label: { show: true, color: "#1a1a1a" } },
      select: { disabled: true }
    }],
    visualMap: {

<audio id="audio-player" preload="auto"></audio>

<script>
/* ==========================================================
 *  Pixel Music Player
 *  - Add your .mp3 files to asset/music/ folder
 *  - Update the playlist array below
 * ========================================================== */
(function() {
  // ===== PLAYLIST: Add your songs here =====
  var playlist = [
    { title: 'MINMI - 四季ノ唄', src: 'asset/music/MINMI旻觅 - 四季ノ唄.mp3' },
  ];

  var currentTrack = 0;
  var isPlaying = false;

  // DOM elements
  var audio = document.getElementById('audio-player');
  var titleEl = document.getElementById('song-title');
  var timeEl = document.getElementById('song-time');
  var progressFill = document.getElementById('progress-fill');
  var volumeFill = document.getElementById('volume-fill');
  var btnPlay = document.getElementById('btn-play');
  var btnPrev = document.getElementById('btn-prev');
  var btnNext = document.getElementById('btn-next');
  var progressBar = document.getElementById('progress-bar');
  var volumeBar = document.getElementById('volume-bar');
  var reelLeft = document.getElementById('reel-left');
  var reelRight = document.getElementById('reel-right');

  // Format time (seconds -> m:ss)
  function formatTime(sec) {
    if (isNaN(sec)) return '0:00';
    var m = Math.floor(sec / 60);
    var s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  // Load a track
  function loadTrack(index) {
    if (index < 0 || index >= playlist.length) return;
    currentTrack = index;
    audio.src = playlist[index].src;
    titleEl.textContent = playlist[index].title;
    audio.load();
  }

  // Play
  function play() {
    audio.play().then(function() {
      isPlaying = true;
      btnPlay.innerHTML = '&#10074;&#10074;'; // pause icon
      reelLeft.classList.add('spinning');
      reelRight.classList.add('spinning');
    }).catch(function(err) {
      console.log('Play failed:', err);
    });
  }

  // Pause
  function pause() {
    audio.pause();
    isPlaying = false;
    btnPlay.innerHTML = '&#9654;'; // play icon
    reelLeft.classList.remove('spinning');
    reelRight.classList.remove('spinning');
  }

  // Toggle play/pause
  function togglePlay() {
    if (isPlaying) {
      pause();
    } else {
      play();
    }
  }

  // Next track
  function nextTrack() {
    var next = (currentTrack + 1) % playlist.length;
    loadTrack(next);
    if (isPlaying) play();
  }

  // Previous track
  function prevTrack() {
    var prev = (currentTrack - 1 + playlist.length) % playlist.length;
    loadTrack(prev);
    if (isPlaying) play();
  }

  // Update progress bar and time display
  audio.addEventListener('timeupdate', function() {
    if (audio.duration) {
      var pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      timeEl.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
    }
  });

  // When track ends, play next
  audio.addEventListener('ended', function() {
    nextTrack();
  });

  // Click on progress bar to seek
  progressBar.addEventListener('click', function(e) {
    if (audio.duration) {
      var rect = progressBar.getBoundingClientRect();
      var pct = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
    }
  });

  // Click on volume bar to change volume
  volumeBar.addEventListener('click', function(e) {
    var rect = volumeBar.getBoundingClientRect();
    var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    audio.volume = pct;
    volumeFill.style.width = (pct * 100) + '%';
  });

  // Button events
  btnPlay.addEventListener('click', togglePlay);
  btnNext.addEventListener('click', nextTrack);
  btnPrev.addEventListener('click', prevTrack);

  // ===== Draggable player =====
  var player = document.getElementById('pixel-player');
  var isDragging = false;
  var dragOffsetX = 0, dragOffsetY = 0;

  player.addEventListener('mousedown', function(e) {
    // Only drag from the top area (not from buttons/controls)
    if (e.target.closest('.pixel-btn') || e.target.closest('.pixel-player-progress') || e.target.closest('.pixel-volume-slider')) return;
    isDragging = true;
    var rect = player.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    player.style.cursor = 'grabbing';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    var x = e.clientX - dragOffsetX;
    var y = e.clientY - dragOffsetY;
    // Keep within viewport
    x = Math.max(0, Math.min(window.innerWidth - player.offsetWidth, x));
    y = Math.max(0, Math.min(window.innerHeight - player.offsetHeight, y));
    player.style.left = x + 'px';
    player.style.top = y + 'px';
    player.style.right = 'auto';
    player.style.bottom = 'auto';
  });

  document.addEventListener('mouseup', function() {
    if (isDragging) {
      isDragging = false;
      player.style.cursor = 'move';
    }
  });

  // Initialize
  audio.volume = 0.7;
  loadTrack(0);

  // ===== Auto-play attempt =====
  // Try to play immediately. If browser blocks, play on first user interaction.
  function tryAutoplay() {
    play().then(function() {
      // Autoplay succeeded
    }).catch(function() {
      // Autoplay blocked - play on first user interaction
      function playOnInteraction() {
        play();
        document.removeEventListener('click', playOnInteraction);
        document.removeEventListener('keydown', playOnInteraction);
        document.removeEventListener('scroll', playOnInteraction);
        document.removeEventListener('touchstart', playOnInteraction);
      }
      document.addEventListener('click', playOnInteraction);
      document.addEventListener('keydown', playOnInteraction);
      document.addEventListener('scroll', playOnInteraction);
      document.addEventListener('touchstart', playOnInteraction);
    });
  }

  // Wait for audio to be loaded before trying to play
  if (audio.readyState >= 2) {
    tryAutoplay();
  } else {
    audio.addEventListener('canplay', function() {
      tryAutoplay();
    }, { once: true });
  }
})();
</script>
